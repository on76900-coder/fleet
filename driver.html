<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>تتبع الرحلة</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080c14;color:#e2e8f0;font-family:system-ui,sans-serif;min-height:100vh;padding:16px}
.card{background:#0f1520;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px;margin-bottom:14px}
.title{text-align:center;font-size:20px;font-weight:700;color:#22d3ee;padding:16px 0 8px}
label{display:block;font-size:12px;color:#8a9ab8;margin-bottom:6px}
select,input{width:100%;background:#080c14;border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#e2e8f0;padding:10px 12px;font-size:15px;font-family:inherit}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px}
.btn-start{background:#00d4aa;color:#080c14}
.btn-stop{background:#ff4444;color:white;display:none}
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.kpi{background:#080c14;border-radius:10px;padding:14px;text-align:center}
.kv{font-size:24px;font-weight:700;margin-bottom:4px}
.kl{font-size:11px;color:#8a9ab8}
.err{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.3);border-radius:8px;padding:10px;font-size:13px;color:#ff8888;margin-top:10px;display:none}
.status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-left:6px}
.active-dot{background:#00d4aa;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* speed alert overlay */
#speed-alert{display:none;position:fixed;inset:0;z-index:9999;background:rgba(200,0,0,.93);flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer}
#speed-alert.show{display:flex;animation:flash .5s infinite}
@keyframes flash{0%,100%{background:rgba(200,0,0,.93)}50%{background:rgba(255,60,60,.98)}}
.alert-icon{font-size:72px;animation:bounce .6s infinite alternate}
@keyframes bounce{to{transform:scale(1.2)}}
.alert-speed{font-size:48px;font-weight:900;color:white;margin:8px 0}
.alert-text{font-size:20px;color:rgba(255,255,255,.9);font-weight:700}
.alert-limit{font-size:15px;color:rgba(255,255,255,.7);margin-top:6px}
.alert-dismiss{margin-top:20px;background:rgba(255,255,255,.2);border:2px solid white;border-radius:10px;padding:10px 24px;color:white;font-size:14px}
.log-item{background:#080c14;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:13px;border:1px solid rgba(255,255,255,.06)}
.log-truck{color:#22d3ee;font-weight:700}
.log-km{color:#00d4aa}
.hidden{display:none!important}
</style>
</head>
<body>

<div id="speed-alert" onclick="dismissAlert()">
  <div class="alert-icon">🚨</div>
  <div class="alert-speed" id="alert-spd"></div>
  <div class="alert-text">تجاوزت الحد المسموح!</div>
  <div class="alert-limit" id="alert-lim"></div>
  <div class="alert-dismiss">اضغط للإغلاق</div>
</div>

<div class="title">📍 تتبع رحلتك</div>

<div class="card" id="setup-card">
  <div style="margin-bottom:12px">
    <label>اختر عربيتك</label>
    <select id="truck-sel" onchange="truckChanged()"></select>
  </div>
  <div id="err" class="err"></div>
  <button class="btn btn-start" id="start-btn" onclick="startTrip()">▶️ ابدأ الرحلة</button>
  <button class="btn btn-stop" id="stop-btn" onclick="stopTrip()">⏹️ إنهاء الرحلة</button>
</div>

<div class="card hidden" id="live-card">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <span style="font-size:13px;color:#00d4aa;font-weight:700">
      <span class="status-dot active-dot"></span> الرحلة شغالة — <span id="live-truck"></span>
    </span>
  </div>
  <div class="kgrid">
    <div class="kpi"><div class="kv" id="live-dist" style="color:#22d3ee">0.00</div><div class="kl">كيلومتر</div></div>
    <div class="kpi"><div class="kv" id="live-dur" style="color:#8a9ab8">00:00:00</div><div class="kl">مدة الرحلة</div></div>
    <div class="kpi" style="grid-column:span 2"><div class="kv" id="live-spd" style="color:#ffd700;font-size:32px">0 كم/س</div><div class="kl">السرعة الحالية</div></div>
  </div>
</div>

<div class="card" id="history-card">
  <div style="font-size:13px;color:#8a9ab8;font-weight:600;margin-bottom:10px">📋 رحلاتك السابقة</div>
  <div id="history-list"><div style="text-align:center;color:#4a5670;padding:16px;font-size:13px">لسه مفيش رحلات</div></div>
</div>

<script>
var FB='https://fleet-gps-65162-default-rtdb.firebaseio.com';
var MAX_SPEED=(function(){var m=location.search.match(/[?&]maxspeed=([^&]+)/);return m?parseInt(m[1]):80;})();
var TRUCK_LOCK=(function(){var m=location.search.match(/[?&]truck=([^&]+)/);return m?decodeURIComponent(m[1]):null;})();

var TRUCKS=[{"T":"1763","TT":"JMC","cons":9.0},{"T":"1983","TT":"JMC","cons":9.0},{"T":"1842","TT":"JMC","cons":9.0},{"T":"2718","TT":"Jumbo 1","cons":6.25},{"T":"1582","TT":"Canter O","cons":10.5},{"T":"1823","TT":"JMC","cons":9.0},{"T":"1516","TT":"Dababa","cons":10.5},{"T":"1597","TT":"Canter O","cons":10.5},{"T":"7956","TT":"Dababa","cons":10.5},{"T":"1985","TT":"JMC","cons":9.0},{"T":"1625","TT":"Canter O","cons":10.5},{"T":"1765","TT":"JMC","cons":9.0},{"T":"1579","TT":"Canter O","cons":10.5},{"T":"1798","TT":"JMC","cons":9.0},{"T":"1745","TT":"JMC","cons":9.0},{"T":"1837","TT":"JMC","cons":9.0},{"T":"1984","TT":"JMC","cons":9.0},{"T":"7544","TT":"DMax","cons":10.5},{"T":"1869","TT":"JMC","cons":9.0},{"T":"1586","TT":"Dababa","cons":10.5},{"T":"1596","TT":"Canter O","cons":10.5},{"T":"2897","TT":"Dababa","cons":10.5},{"T":"3179","TT":"Fiat","cons":9.0},{"T":"1839","TT":"JMC","cons":9.0},{"T":"1986","TT":"JMC","cons":9.0},{"T":"3184","TT":"Fiat","cons":9.0},{"T":"8493","TT":"Jumbo","cons":6.25},{"T":"1725","TT":"Canter C","cons":10.5}];

var state={watchId:null,timer:null,points:[],dist:0,startTime:null,speed:0,truck:null,tt:null,cons:9,lastFB:0,alertOn:false,lastViol:0};
var trips=[];try{var _t=localStorage.getItem('drv_trips');if(_t)trips=JSON.parse(_t);}catch(e){}

// populate truck list
var sel=document.getElementById('truck-sel');
TRUCKS.forEach(function(t){
  var o=document.createElement('option');
  o.value=t.T;o.setAttribute('data-tt',t.TT);o.setAttribute('data-cons',t.cons);
  o.textContent='🚚 '+t.T+' — '+t.TT;
  sel.appendChild(o);
});
if(TRUCK_LOCK){sel.value=TRUCK_LOCK;sel.disabled=true;}

function truckChanged(){}

function haversine(la1,lo1,la2,lo2){
  var R=6371,dL=(la2-la1)*Math.PI/180,dO=(lo2-lo1)*Math.PI/180;
  var a=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)*Math.sin(dO/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function startTrip(){
  var errEl=document.getElementById('err');errEl.style.display='none';
  if(!navigator.geolocation){errEl.textContent='⚠️ المتصفح مش بيدعم GPS';errEl.style.display='block';return;}
  var opt=sel.options[sel.selectedIndex];
  state.truck=sel.value;state.tt=opt.getAttribute('data-tt');state.cons=parseFloat(opt.getAttribute('data-cons'))||9;
  state.points=[];state.dist=0;state.startTime=Date.now();state.speed=0;state.lastFB=0;state.alertOn=false;
  state.watchId=navigator.geolocation.watchPosition(onPos,onErr,{enableHighAccuracy:true,maximumAge:0,timeout:20000});
  state.timer=setInterval(tick,1000);
  document.getElementById('start-btn').style.display='none';
  document.getElementById('stop-btn').style.display='block';
  document.getElementById('setup-card').style.borderColor='rgba(0,212,170,.4)';
  document.getElementById('live-card').classList.remove('hidden');
  document.getElementById('live-truck').textContent=state.truck+' — '+state.tt;
}

function onPos(pos){
  var la=pos.coords.latitude,lo=pos.coords.longitude;
  if(state.points.length){
    var last=state.points[state.points.length-1];
    var d=haversine(last.la,last.lo,la,lo);
    if(d>0.006&&d<3)state.dist+=d;
  }
  state.points.push({la:la,lo:lo,t:Date.now()});
  state.speed=pos.coords.speed>0?pos.coords.speed*3.6:state.speed;
  // speed alert
  if(state.speed>MAX_SPEED&&!state.alertOn){
    state.alertOn=true;
    document.getElementById('alert-spd').textContent=Math.round(state.speed)+' كم/س';
    document.getElementById('alert-lim').textContent='الحد المسموح: '+MAX_SPEED+' كم/س';
    document.getElementById('speed-alert').classList.add('show');
    try{if(navigator.vibrate)navigator.vibrate([500,200,500,200,500]);}catch(e){}
    try{
      var ctx=new(window.AudioContext||window.webkitAudioContext)();
      [880,660,880,660].forEach(function(f,i){var o=ctx.createOscillator();var g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='square';o.frequency.value=f;g.gain.value=0.25;o.start(ctx.currentTime+i*0.25);o.stop(ctx.currentTime+i*0.25+0.2);});
    }catch(e){}
    // push violation
    var now=Date.now();
    if(now-state.lastViol>30000){
      state.lastViol=now;
      var tk=state.truck.replace(/[^a-zA-Z0-9_]/g,'_');
      fetch(FB+'/gps_violations/'+tk+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({truck:state.truck,truckType:state.tt,speed:Math.round(state.speed),limit:MAX_SPEED,ts:now})}).catch(function(){});
    }
  }else if(state.speed<=MAX_SPEED&&state.alertOn){
    state.alertOn=false;
    document.getElementById('speed-alert').classList.remove('show');
  }
  // push position every 15s
  var n=Date.now();
  if(n-state.lastFB>15000){
    state.lastFB=n;
    var tk=state.truck.replace(/[^a-zA-Z0-9_]/g,'_');
    fetch(FB+'/gps_positions/'+tk+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({lat:la,lng:lo,speed:Math.round(state.speed||0),truck:state.truck,truckType:state.tt,distanceKm:+state.dist.toFixed(2),ts:n,active:true,speeding:state.speed>MAX_SPEED})}).catch(function(){});
  }
}

function onErr(e){
  var errEl=document.getElementById('err');
  var msgs={1:'⚠️ لازم تسمح للمتصفح بالوصول للموقع (GPS)',2:'⚠️ مفيش إشارة GPS، جرب في مكان مفتوح',3:'⚠️ وقت الانتظار انتهى، هنحاول تاني'};
  errEl.textContent=msgs[e.code]||'⚠️ خطأ في GPS';errEl.style.display='block';
}

function tick(){
  if(!state.startTime)return;
  var s=Math.floor((Date.now()-state.startTime)/1000);
  var h=String(Math.floor(s/3600)).padStart(2,'0'),m=String(Math.floor((s%3600)/60)).padStart(2,'0'),ss=String(s%60).padStart(2,'0');
  document.getElementById('live-dist').textContent=state.dist.toFixed(2);
  document.getElementById('live-dur').textContent=h+':'+m+':'+ss;
  document.getElementById('live-spd').textContent=Math.round(state.speed||0)+' كم/س';
}

function stopTrip(){
  if(state.watchId!==null)navigator.geolocation.clearWatch(state.watchId);
  if(state.timer)clearInterval(state.timer);
  // mark inactive
  var tk=state.truck.replace(/[^a-zA-Z0-9_]/g,'_');
  fetch(FB+'/gps_positions/'+tk+'/active.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:'false'}).catch(function(){});
  var dist=state.dist,cons=state.cons;
  if(dist>0.01){
    var now=new Date();
    var trip={id:'t'+Date.now(),truck:state.truck,truckType:state.tt,date:now.toLocaleDateString('ar-EG'),start:new Date(state.startTime).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}),end:now.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}),distanceKm:+dist.toFixed(2),cons:cons,ts:Date.now()};
    trips.unshift(trip);
    try{localStorage.setItem('drv_trips',JSON.stringify(trips.slice(0,50)));}catch(e){}
    // push to Firebase (manager sees cost, driver doesn't)
    fetch(FB+'/gps_trips.json',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(trip)}).catch(function(){});
  }
  state={watchId:null,timer:null,points:[],dist:0,startTime:null,speed:0,truck:null,tt:null,cons:9,lastFB:0,alertOn:false,lastViol:0};
  document.getElementById('start-btn').style.display='block';
  document.getElementById('stop-btn').style.display='none';
  document.getElementById('setup-card').style.borderColor='';
  document.getElementById('live-card').classList.add('hidden');
  document.getElementById('speed-alert').classList.remove('show');
  renderHistory();
}

function dismissAlert(){state.alertOn=false;document.getElementById('speed-alert').classList.remove('show');}

function renderHistory(){
  var el=document.getElementById('history-list');
  if(!trips.length){el.innerHTML='<div style="text-align:center;color:#4a5670;padding:16px;font-size:13px">لسه مفيش رحلات</div>';return;}
  el.innerHTML=trips.slice(0,20).map(function(t){
    return '<div class="log-item"><span class="log-truck">🚚 '+t.truck+' — '+t.truckType+'</span><span style="float:left;color:#8a9ab8;font-size:11px">'+t.date+'</span><br><span style="color:#8a9ab8;font-size:11px">'+t.start+' ← '+t.end+'</span> &nbsp; <span class="log-km">'+t.distanceKm.toFixed(2)+' كم</span></div>';
  }).join('');
}

renderHistory();
</script>
</body>
</html>
